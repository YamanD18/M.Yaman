<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Biodata Docker</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg, #1e3c72, #2a5298, #6dd5fa);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
}

@keyframes gradientBG{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

.card{

    width:470px;

    background:rgba(255,255,255,0.95);

    backdrop-filter:blur(10px);

    padding:35px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.3);

}

h1{

    color:#1565C0;

    margin-bottom:20px;

    font-size:42px;

}

img{

    width:180px;
    height:180px;

    object-fit:cover;

    border-radius:50%;

    border:6px solid #1565C0;

    margin-bottom:20px;

}

h2{

    margin-bottom:20px;

    font-size:34px;

}

table{

    margin:auto;

    font-size:22px;

    text-align:left;

}

table td{

    padding:6px;

}

p{

    margin-top:25px;

    color:#555;

    font-size:18px;

}

</style>

</head>
<body>

<div class="card">

<h1>PROJECT DOCKER</h1>

<img src="{{ url_for('static', filename='yaman.jpeg') }}">

<h2>{{ nama }}</h2>

<table>
<tr>
<td><b>NIM</b></td>
<td>: {{ nim }}</td>
</tr>

<tr>
<td><b>Kelas</b></td>
<td>: {{ kelas }}</td>
</tr>
</table>

<p>
Aplikasi ini berjalan menggunakan Docker.
</p>

</div>

</body>
</html>
